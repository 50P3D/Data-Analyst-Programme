<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Corner Coach — Singapore GP</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:       #0a0b0d;
    --surface:  #111318;
    --panel:    #161b22;
    --border:   #21272f;
    --accent:   #e8473f;
    --accent2:  #f5a623;
    --ref:      #2ecc71;
    --driver:   #e8473f;
    --text:     #d4dae4;
    --muted:    #5a6270;
    --good:     #2ecc71;
    --bad:      #e8473f;
    --neutral:  #f5a623;
    --mono: 'DM Mono', monospace;
    --cond: 'Barlow Condensed', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── scanline texture ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: rgba(10,11,13,0.92);
    backdrop-filter: blur(8px);
    z-index: 100;
  }

  .logo {
    font-family: var(--cond);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #fff;
  }
  .logo span { color: var(--accent); }

  .circuit-label {
    font-family: var(--cond);
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── layout ── */
  .shell {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: calc(100vh - 57px);
  }

  /* ── sidebar ── */
  aside {
    border-right: 1px solid var(--border);
    padding: 24px 0;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .sidebar-section {
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
  }
  .sidebar-section:last-child { border-bottom: none; }

  .section-label {
    font-family: var(--cond);
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
    padding-top: 20px;
  }

  select {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 4px;
    appearance: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  select:hover, select:focus { border-color: var(--accent); outline: none; }

  .lap-list {
    max-height: 340px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .lap-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 20px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.12s;
  }
  .lap-item:hover  { background: var(--panel); border-left-color: var(--muted); }
  .lap-item.active { background: var(--panel); border-left-color: var(--accent); }

  .lap-driver {
    font-family: var(--cond);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.05em;
    color: #fff;
  }
  .lap-delta {
    font-size: 11px;
    font-weight: 500;
  }
  .lap-delta.neg { color: var(--good); }
  .lap-delta.pos { color: var(--bad); }

  /* ── main area ── */
  main {
    padding: 28px 32px;
    overflow-y: auto;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    color: var(--muted);
    gap: 12px;
  }
  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-family: var(--cond); font-size: 16px; letter-spacing: 0.1em; text-transform: uppercase; }

  /* ── lap header ── */
  .lap-header {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .lap-header-driver {
    font-family: var(--cond);
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #fff;
    text-transform: uppercase;
  }
  .lap-header-time {
    font-family: var(--mono);
    font-size: 20px;
    color: var(--text);
  }
  .lap-header-delta {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 500;
  }
  .lap-header-delta.neg { color: var(--good); }
  .lap-header-delta.pos { color: var(--bad); }

  /* ── corner grid ── */
  .corners-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }

  .corner-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    animation: cardIn 0.25s ease both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .corner-card:nth-child(2) { animation-delay: 0.05s; }
  .corner-card:nth-child(3) { animation-delay: 0.10s; }
  .corner-card:nth-child(4) { animation-delay: 0.15s; }

  .corner-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--border);
  }

  .corner-name {
    font-family: var(--cond);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #fff;
  }
  .corner-badge {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
    font-family: var(--cond);
    font-weight: 600;
  }
  .badge-good    { background: rgba(46,204,113,0.15); color: var(--good); border: 1px solid rgba(46,204,113,0.3); }
  .badge-bad     { background: rgba(232,71,63,0.15);  color: var(--bad);  border: 1px solid rgba(232,71,63,0.3); }
  .badge-neutral { background: rgba(245,166,35,0.15); color: var(--neutral); border: 1px solid rgba(245,166,35,0.3); }

  /* ── stats row ── */
  .stats-row {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .stat-cell {
    flex: 1;
    padding: 10px 12px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .stat-cell:last-child { border-right: none; }
  .stat-label {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: var(--cond);
  }
  .stat-value {
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    font-family: var(--mono);
  }
  .stat-value.neg { color: var(--good); }
  .stat-value.pos { color: var(--bad); }

  /* ── chart ── */
  .chart-area {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .chart-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 10px;
  }
  .chart-toggle button {
    flex: 1;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 5px 0;
    cursor: pointer;
    transition: all 0.12s;
  }
  .chart-toggle button:first-child { border-radius: 3px 0 0 3px; }
  .chart-toggle button:last-child  { border-radius: 0 3px 3px 0; border-left: none; }
  .chart-toggle button.active {
    background: var(--border);
    color: #fff;
  }
  .chart-wrap { position: relative; height: 120px; }

  /* ── coaching advice ── */
  .advice-block {
    padding: 12px 16px;
  }
  .advice-icon {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    margin-right: 8px;
    vertical-align: middle;
  }
  .advice-text {
    color: #b8c0cc;
    line-height: 1.7;
    font-size: 12px;
  }

  /* ── legend ── */
  .chart-legend {
    display: flex;
    gap: 14px;
    margin-bottom: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-family: var(--cond);
  }
  .legend-dot {
    width: 8px; height: 2px;
    border-radius: 1px;
  }
  .legend-dot.ref    { background: var(--ref); }
  .legend-dot.driver { background: var(--driver); }

  /* ── loading ── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; color: var(--muted); padding: 60px 0;
  }
  .loading::before {
    content: '';
    width: 14px; height: 14px;
    border: 1px solid var(--muted);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">Corner <span>Coach</span></div>
  <div class="circuit-label">Marina Bay — Singapore GP 2025 · Q</div>
</header>

<div class="shell">
  <aside>
    <div class="sidebar-section">
      <span class="section-label">Filter by driver</span>
      <select id="driverFilter">
        <option value="">All drivers</option>
      </select>
    </div>
    <div class="sidebar-section" style="padding-bottom:0;">
      <span class="section-label">Select lap</span>
    </div>
    <div class="lap-list" id="lapList">
      <div class="loading">Loading laps…</div>
    </div>
  </aside>

  <main id="main">
    <div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" stroke="#5a6270" stroke-width="1.5"/>
        <path d="M16 24 L22 30 L32 18" stroke="#5a6270" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p>Select a lap to begin analysis</p>
    </div>
  </main>
</div>

<script>
const API = 'http://localhost:8000/api';

// Chart instances keyed by corner + metric
const charts = {};
let allLaps   = [];
let activeLap = null;

// ── Helpers ──────────────────────────────────────────────────────────────
function fmt(s) {
  const sign = s >= 0 ? '+' : '';
  return sign + s.toFixed(3) + 's';
}
function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = (s % 60).toFixed(3).padStart(6, '0');
  return `${m}:${sec}`;
}
function deltaClass(v) { return v <= 0 ? 'neg' : 'pos'; }
function badgeInfo(delta_mean_speed, delta_min_speed) {
  if (delta_min_speed > -2 && delta_mean_speed > -1.5) return ['Optimal', 'badge-good'];
  if (delta_min_speed < -8 || delta_mean_speed < -5)   return ['Critical', 'badge-bad'];
  return ['Improvable', 'badge-neutral'];
}

// ── Fetch ─────────────────────────────────────────────────────────────────
async function get(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── Boot ──────────────────────────────────────────────────────────────────
async function boot() {
  try {
    allLaps = await get('/laps');
    const drivers = [...new Set(allLaps.map(l => l.Driver))].sort();
    const sel = document.getElementById('driverFilter');
    drivers.forEach(d => {
      const o = document.createElement('option');
      o.value = d; o.textContent = d;
      sel.appendChild(o);
    });
    sel.addEventListener('change', () => renderLapList(sel.value || null));
    renderLapList(null);
  } catch(e) {
    document.getElementById('lapList').innerHTML =
      `<div style="padding:20px;color:#e8473f;font-size:11px;">API error: ${e.message}<br><br>Make sure FastAPI is running on port 8000.</div>`;
  }
}

function renderLapList(driverFilter) {
  const laps = driverFilter ? allLaps.filter(l => l.Driver === driverFilter) : allLaps;
  const list = document.getElementById('lapList');
  list.innerHTML = '';
  laps.forEach(l => {
    const item = document.createElement('div');
    item.className = 'lap-item' + (activeLap === l.LapId ? ' active' : '');
    item.dataset.lapId = l.LapId;
    const dc = l.delta_lap_time <= 0 ? 'neg' : 'pos';
    const sign = l.delta_lap_time >= 0 ? '+' : '';
    item.innerHTML = `
      <span class="lap-driver">${l.Driver}</span>
      <span class="lap-delta ${dc}">${sign}${l.delta_lap_time.toFixed(3)}s</span>`;
    item.addEventListener('click', () => selectLap(l.LapId));
    list.appendChild(item);
  });
}

// ── Select & Render ───────────────────────────────────────────────────────
async function selectLap(lapId) {
  activeLap = lapId;
  document.querySelectorAll('.lap-item').forEach(el => {
    el.classList.toggle('active', el.dataset.lapId === lapId);
  });

  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading">Analysing telemetry…</div>';

  try {
    const data = await get('/coach/' + encodeURIComponent(lapId));
    renderReport(data, main);
  } catch(e) {
    main.innerHTML = `<div style="color:var(--bad);padding:20px;">Error: ${e.message}</div>`;
  }
}

function renderReport(data, main) {
  // Destroy old charts
  Object.values(charts).forEach(c => c.destroy());
  Object.keys(charts).forEach(k => delete charts[k]);

  const dc = deltaClass(data.delta_lap_time);
  main.innerHTML = `
    <div class="lap-header">
      <div class="lap-header-driver">${data.driver}</div>
      <div class="lap-header-time">${fmtTime(data.lap_time_s)}</div>
      <div class="lap-header-delta ${dc}">${fmt(data.delta_lap_time)}</div>
    </div>
    <div class="corners-grid" id="cornersGrid"></div>`;

  const grid = document.getElementById('cornersGrid');

  ['T1', 'T2', 'T3', 'T4'].forEach((corner, idx) => {
    const cd = data.corners[corner];
    if (!cd || cd.error) {
      grid.innerHTML += `<div class="corner-card" style="padding:20px;color:var(--muted);">${corner} — no data</div>`;
      return;
    }

    const [badgeText, badgeClass] = badgeInfo(cd.delta_mean_speed_kmh, cd.delta_min_speed_kmh);
    const msClass  = deltaClass(cd.delta_mean_speed_kmh);
    const minClass = deltaClass(cd.delta_min_speed_kmh);
    const curv_sign = cd.delta_mean_curvature >= 0 ? '+' : '';
    const lat_sign  = cd.delta_peak_lat_accel >= 0 ? '+' : '';
    const cardId = `card-${corner}`;

    const card = document.createElement('div');
    card.className = 'corner-card';
    card.style.animationDelay = `${idx * 0.06}s`;
    card.innerHTML = `
      <div class="corner-card-header">
        <span class="corner-name">${corner}</span>
        <span class="corner-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="stats-row">
        <div class="stat-cell">
          <span class="stat-label">Avg Δ speed</span>
          <span class="stat-value ${msClass}">${cd.delta_mean_speed_kmh >= 0 ? '+' : ''}${cd.delta_mean_speed_kmh.toFixed(1)} km/h</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">Min Δ speed</span>
          <span class="stat-value ${minClass}">${cd.delta_min_speed_kmh >= 0 ? '+' : ''}${cd.delta_min_speed_kmh.toFixed(1)} km/h</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">Δ lat-G</span>
          <span class="stat-value">${lat_sign}${cd.delta_peak_lat_accel.toFixed(1)}</span>
        </div>
      </div>
      <div class="chart-area">
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot ref"></div> Reference</div>
          <div class="legend-item"><div class="legend-dot driver"></div> Driver</div>
        </div>
        <div class="chart-toggle">
          <button class="active" onclick="switchMetric('${corner}', 'curvature', this)">Curvature</button>
          <button onclick="switchMetric('${corner}', 'lat_accel', this)">Lateral G</button>
        </div>
        <div class="chart-wrap">
          <canvas id="chart-${corner}"></canvas>
        </div>
      </div>
      <div class="advice-block">
        <span class="advice-icon"></span>
        <span class="advice-text">${cd.coaching_advice}</span>
      </div>`;

    grid.appendChild(card);
    buildChart(corner, cd, 'curvature');
  });
}

// ── Charts ─────────────────────────────────────────────────────────────────
function buildChart(corner, cd, metric) {
  const canvasId = `chart-${corner}`;
  const existing = charts[canvasId];
  if (existing) existing.destroy();

  const ref    = cd.ref_profile    || {};
  const driver = cd.driver_profile || {};

  const refY    = ref[metric]    || [];
  const driverY = driver[metric] || [];
  const refX    = ref.distances  || refY.map((_,i) => i);
  const driverX = driver.distances || driverY.map((_,i) => i);

  // Clip extreme values for cleaner display
  const clip = v => Math.max(-0.08, Math.min(0.08, v));
  const clipLat = v => Math.max(-80, Math.min(80, v));
  const clipFn = metric === 'curvature' ? clip : clipLat;

  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  charts[canvasId] = new Chart(canvas, {
    type: 'line',
    data: {
      datasets: [
        {
          label: 'Reference',
          data: refX.map((x, i) => ({ x, y: clipFn(refY[i] ?? 0) })),
          borderColor: 'rgba(46,204,113,0.9)',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.3,
        },
        {
          label: 'Driver',
          data: driverX.map((x, i) => ({ x, y: clipFn(driverY[i] ?? 0) })),
          borderColor: 'rgba(232,71,63,0.9)',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.3,
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 250 },
      plugins: { legend: { display: false }, tooltip: {
        backgroundColor: '#1a1f27',
        titleColor: '#5a6270',
        bodyColor: '#d4dae4',
        borderColor: '#21272f',
        borderWidth: 1,
        callbacks: {
          label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(4)}`
        }
      }},
      scales: {
        x: {
          type: 'linear',
          title: { display: false },
          ticks: { color: '#5a6270', font: { family: "'DM Mono'", size: 9 }, maxTicksLimit: 5 },
          grid: { color: 'rgba(255,255,255,0.04)' },
        },
        y: {
          ticks: { color: '#5a6270', font: { family: "'DM Mono'", size: 9 }, maxTicksLimit: 4 },
          grid: { color: 'rgba(255,255,255,0.04)' },
        }
      }
    }
  });
}

window.switchMetric = function(corner, metric, btn) {
  btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Re-fetch current data for corner from latest rendered report
  const lapId = activeLap;
  if (!lapId) return;
  get('/coach/' + encodeURIComponent(lapId)).then(data => {
    const cd = data.corners[corner];
    if (cd && !cd.error) buildChart(corner, cd, metric);
  });
};

boot();
</script>
</body>
</html>
